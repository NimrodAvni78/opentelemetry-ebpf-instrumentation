receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 100
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
exporters:
  prometheus:
    endpoint: "otelcol:9464"
    resource_to_telemetry_conversion:
      enabled: true
    enable_open_metrics: true
  otlphttp/jaeger:
    endpoint: http://jaeger:4318
    tls:
      insecure: true
  otlp/weaver:
    endpoint: weaver:4317
    tls:
      insecure: true
    compression: none
service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [prometheus, otlp/weaver]
    traces:
      receivers: [otlp]
      exporters: [otlphttp/jaeger, otlp/weaver]
