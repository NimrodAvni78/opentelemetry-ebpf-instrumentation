name: Lint (Darwin)

on:
  push:
    branches: ["main", "release-*"]
  pull_request:
    branches: ["main", "release-*"]
    paths:
      - ".github/workflows/lint_darwin.yml"
      - "Dockerfile"
      - "**/*Dockerfile*"
      - "Makefile"
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "bpf/**"
      - "cmd/**"
      - "devdocs/dependency-integrity-policy.md"
      - "devdocs/README.md"
      - "scripts/lint-dependency-policy.sh"
      - "configs/**"
      - "internal/**"
      - "pkg/**"
      - "scripts/**"

concurrency:
  group: lint-darwin-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-bpf:
    name: docker-generate on linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: "false"

      - name: Generate BPF files
        run: make docker-generate

      - name: Upload generated BPF files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # prevent cache poisoning by using the SHA of the commit
          name: bpf-generated-${{ github.sha }}
          path: |
            **/*_bpfel.go
            **/*_bpfel.o
          retention-days: 1

  # macOS runners do not have docker installed, so we need to download the generated BPF files from the Linux runner.
  lint-darwin:
    name: lint on macOS
    needs: generate-bpf
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: "false"

      - name: Download generated BPF files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bpf-generated-${{ github.sha }}

      - name: Run lint
        run: make lint
