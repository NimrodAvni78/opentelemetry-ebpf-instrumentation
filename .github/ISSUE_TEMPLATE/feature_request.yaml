name: Feature Request
description: Suggest an enhancement
labels: ["enhancement", "needs triage"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the project does this affect?
      options:
        - OBI (eBPF instrumentation)
        - k8s-cache
        - Both / unsure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the current pain point?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they're insufficient.
  - type: textarea
    id: context
    attributes:
      label: Additional context
